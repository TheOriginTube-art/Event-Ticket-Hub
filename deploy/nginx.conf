# nginx конфиг для ДПС Радар на VDS
# Слушает на порту 80 (ваш SSL-терминатор / Certbot проксирует сюда с 443)

server {
    listen 80;
    server_name _;

    # Максимальный размер тела запроса (для Telegram webhook)
    client_max_body_size 10m;

    # ---------- API (бот, webhook, события) ----------
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ---------- Мини-приложение (статика) ----------
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэшируем статику на 7 дней
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
