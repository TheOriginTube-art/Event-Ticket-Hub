openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Movie, theater and concert events aggregated from partner listings
  - name: venues
    description: Cinemas, theaters and concert venues
  - name: sessions
    description: Showtimes/sessions for events
  - name: checkout
    description: Ticket checkout
  - name: orders
    description: Order lookup
  - name: home
    description: Home page summaries
  - name: auth
    description: Account registration, login and session management
  - name: seats
    description: Seat maps for a session
  - name: payment
    description: Payment settings (Ozon Bank QR) shown to customers at checkout
  - name: admin
    description: Admin-only order management (manual payment confirmation)
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /cities:
    get:
      operationId: listCities
      tags: [venues]
      summary: List distinct cities that have venues
      responses:
        "200":
          description: List of cities
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /venues:
    get:
      operationId: listVenues
      tags: [venues]
      summary: List venues
      parameters:
        - name: city
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of venues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Venue"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events with optional filters
      parameters:
        - name: type
          in: query
          required: false
          description: Filter by event type
          schema:
            $ref: "#/components/schemas/EventType"
        - name: city
          in: query
          required: false
          description: Filter to events that have sessions in this city
          schema:
            type: string
        - name: search
          in: query
          required: false
          description: Search by title
          schema:
            type: string
        - name: sort
          in: query
          required: false
          description: Sort order
          schema:
            $ref: "#/components/schemas/EventSortOrder"
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventSummary"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get event detail with sessions and ticket categories
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetail"
        "404":
          description: Event not found

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a single session with its ticket categories
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "404":
          description: Session not found

  /sessions/{id}/seats:
    get:
      operationId: getSessionSeats
      tags: [seats]
      summary: Get the seat map for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Seat map
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Seat"
        "404":
          description: Session not found

  /checkout:
    post:
      operationId: createCheckout
      tags: [checkout]
      summary: Create an order for the selected seats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResult"
        "400":
          description: Invalid input or seats no longer available
        "404":
          description: Session or seat not found

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order status and details (for the confirmation page)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "404":
          description: Order not found

  /orders/mine:
    get:
      operationId: getMyOrders
      tags: [orders]
      summary: List orders for the logged-in user (order history / personal cabinet)
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderDetail"
        "401":
          description: Not authenticated

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "200":
          description: Account created and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Invalid input or email already registered

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out and clear the session
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the currently logged-in user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  /orders/{id}/mark-paid:
    post:
      operationId: markOrderPaid
      tags: [orders]
      summary: Customer confirms they have sent the Ozon Bank transfer
      description: |
        Moves a pending Ozon QR order to "awaiting_confirmation" so the admin
        can verify the transfer and confirm it manually.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order marked as awaiting confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "400":
          description: Order is not awaiting payment (wrong status/method or expired)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Order not found

  /payment-settings:
    get:
      operationId: getPaymentSettings
      tags: [payment]
      summary: Get the current Ozon Bank QR code and payment instructions
      responses:
        "200":
          description: Current payment settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSettings"

  /admin/payment-settings:
    put:
      operationId: updatePaymentSettings
      tags: [admin]
      summary: Update the Ozon Bank QR code image and instructions (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePaymentSettingsInput"
      responses:
        "200":
          description: Updated payment settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSettings"
        "401":
          description: Not authenticated
        "403":
          description: Admin access required

  /admin/orders:
    get:
      operationId: listAdminOrders
      tags: [admin]
      summary: List orders for manual payment review (admin only)
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by order status. Defaults to pending + awaiting_confirmation.
          schema:
            type: string
            enum: [pending, awaiting_confirmation, paid, cancelled, all]
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderDetail"
        "401":
          description: Not authenticated
        "403":
          description: Admin access required

  /admin/orders/{id}/confirm:
    post:
      operationId: confirmAdminOrder
      tags: [admin]
      summary: Confirm a manually-verified Ozon Bank payment (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order confirmed and seats marked sold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "400":
          description: Order cannot be confirmed in its current status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not authenticated
        "403":
          description: Admin access required
        "404":
          description: Order not found

  /admin/orders/{id}/reject:
    post:
      operationId: rejectAdminOrder
      tags: [admin]
      summary: Reject/cancel an order and release its seats (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order cancelled and seats released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "400":
          description: Order cannot be rejected in its current status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not authenticated
        "403":
          description: Admin access required
        "404":
          description: Order not found

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
        Admin only (currently only used for the Ozon Bank payment QR code).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not authenticated
        "403":
          description: Admin access required
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      description: |
        Unconditionally public — no authentication or ACL checks.
        Searches PUBLIC_OBJECT_SEARCH_PATHS for the given file path.
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
          description: Relative file path within the public search paths.
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      description: |
        Serves object entities uploaded via presigned URLs. The Ozon Bank QR
        image is served here unconditionally (public read) since every
        customer at checkout needs to see it.
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
          description: Object path within the private object dir (e.g. `uploads/some-uuid`).
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /home/highlights:
    get:
      operationId: getHomeHighlights
      tags: [home]
      summary: Featured events and quick stats for the home page
      parameters:
        - name: city
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Home highlights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeHighlights"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    EventType:
      type: string
      enum: [movie, theater, concert]

    EventSortOrder:
      type: string
      enum: [dateAsc, priceAsc, priceDesc, ratingDesc]

    Venue:
      type: object
      required: [id, name, city, address]
      properties:
        id:
          type: integer
        name:
          type: string
        city:
          type: string
        address:
          type: string

    TicketCategory:
      type: object
      required: [id, sessionId, name, priceCents, seatsTotal, seatsAvailable]
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        name:
          type: string
        priceCents:
          type: integer
        seatsTotal:
          type: integer
        seatsAvailable:
          type: integer

    SeatStatus:
      type: string
      enum: [available, reserved, sold]

    Seat:
      type: object
      required: [id, sessionId, ticketCategoryId, rowLabel, seatNumber, status, priceCents, categoryName]
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        ticketCategoryId:
          type: integer
        rowLabel:
          type: string
        seatNumber:
          type: integer
        status:
          $ref: "#/components/schemas/SeatStatus"
        priceCents:
          type: integer
        categoryName:
          type: string

    SessionSummary:
      type: object
      required: [id, eventId, startsAt, hall, venue, minPriceCents]
      properties:
        id:
          type: integer
        eventId:
          type: integer
        startsAt:
          type: string
          format: date-time
        hall:
          type: ["string", "null"]
        venue:
          $ref: "#/components/schemas/Venue"
        minPriceCents:
          type: ["integer", "null"]

    SessionDetail:
      type: object
      required: [id, eventId, startsAt, hall, venue, ticketCategories, event]
      properties:
        id:
          type: integer
        eventId:
          type: integer
        startsAt:
          type: string
          format: date-time
        hall:
          type: ["string", "null"]
        venue:
          $ref: "#/components/schemas/Venue"
        ticketCategories:
          type: array
          items:
            $ref: "#/components/schemas/TicketCategory"
        event:
          $ref: "#/components/schemas/EventSummary"

    EventSummary:
      type: object
      required:
        [
          id,
          title,
          type,
          posterUrl,
          genre,
          durationMinutes,
          ageRating,
          rating,
          sourceName,
          minPriceCents,
          cities,
        ]
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          $ref: "#/components/schemas/EventType"
        posterUrl:
          type: ["string", "null"]
        genre:
          type: ["string", "null"]
        durationMinutes:
          type: ["integer", "null"]
        ageRating:
          type: ["string", "null"]
        rating:
          type: ["number", "null"]
        sourceName:
          type: string
        minPriceCents:
          type: ["integer", "null"]
        cities:
          type: array
          description: Distinct cities where this event has scheduled sessions.
          items:
            type: string

    EventDetail:
      type: object
      required:
        [
          id,
          title,
          type,
          description,
          posterUrl,
          genre,
          durationMinutes,
          ageRating,
          rating,
          sourceName,
          sessions,
        ]
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          $ref: "#/components/schemas/EventType"
        description:
          type: ["string", "null"]
        posterUrl:
          type: ["string", "null"]
        genre:
          type: ["string", "null"]
        durationMinutes:
          type: ["integer", "null"]
        ageRating:
          type: ["string", "null"]
        rating:
          type: ["number", "null"]
        sourceName:
          type: string
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/SessionSummary"

    CheckoutInput:
      type: object
      required: [sessionId, seatIds, customerName, customerEmail]
      properties:
        sessionId:
          type: integer
        seatIds:
          type: array
          minItems: 1
          maxItems: 10
          items:
            type: integer
        customerName:
          type: string
          minLength: 1
        customerEmail:
          type: string
          minLength: 3

    CheckoutResult:
      type: object
      required: [url, orderId]
      properties:
        url:
          type: string
        orderId:
          type: integer

    OrderSeat:
      type: object
      required: [id, rowLabel, seatNumber, categoryName, priceCents]
      properties:
        id:
          type: integer
        rowLabel:
          type: string
        seatNumber:
          type: integer
        categoryName:
          type: string
        priceCents:
          type: integer

    OrderStatus:
      type: string
      enum: [pending, awaiting_confirmation, paid, cancelled]

    OrderPaymentMethod:
      type: string
      enum: [ozon_qr, stripe]

    OrderDetail:
      type: object
      required:
        [
          id,
          status,
          paymentMethod,
          totalAmountCents,
          customerName,
          customerEmail,
          createdAt,
          expiresAt,
          event,
          session,
          seats,
        ]
      properties:
        id:
          type: integer
        status:
          $ref: "#/components/schemas/OrderStatus"
        paymentMethod:
          $ref: "#/components/schemas/OrderPaymentMethod"
        totalAmountCents:
          type: integer
        customerName:
          type: string
        customerEmail:
          type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: ["string", "null"]
          format: date-time
        event:
          $ref: "#/components/schemas/EventSummary"
        session:
          $ref: "#/components/schemas/SessionSummary"
        seats:
          type: array
          items:
            $ref: "#/components/schemas/OrderSeat"

    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 6
        name:
          type: string
          minLength: 1

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1

    AuthUser:
      type: object
      required: [id, email, name, isAdmin]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        isAdmin:
          type: boolean

    PaymentSettings:
      type: object
      required: [ozonQrImageUrl, instructions]
      properties:
        ozonQrImageUrl:
          type: ["string", "null"]
        instructions:
          type: ["string", "null"]

    UpdatePaymentSettingsInput:
      type: object
      required: [instructions]
      properties:
        ozonQrImagePath:
          type: ["string", "null"]
          description: objectPath returned from the storage upload endpoint
        instructions:
          type: ["string", "null"]

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    HomeHighlights:
      type: object
      required: [featuredEvents, totalUpcomingSessions, citiesCount, eventsCount]
      properties:
        featuredEvents:
          type: array
          items:
            $ref: "#/components/schemas/EventSummary"
        totalUpcomingSessions:
          type: integer
        citiesCount:
          type: integer
        eventsCount:
          type: integer
