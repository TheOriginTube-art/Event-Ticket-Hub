kind = "web"
previewPath = "/"
title = "TicketFlow"
version = "1.0.0"
id = "artifacts/ticketflow"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24131

[services.development]
run = "pnpm --filter @workspace/ticketflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ticketflow", "run", "build" ]
serve = "static"
publicDir = "artifacts/ticketflow/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24131"
BASE_PATH = "/"
